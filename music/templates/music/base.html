<!DOCTYPE html>
<html>
<head>
    <title>Music Hub</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .profile-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: gray;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">🎵 Music Hub</a>

    <div class="ms-auto d-flex gap-3">
        <a class="nav-link text-white" href="/songs/">Songs</a>
        <a class="nav-link text-white" href="/artists/">Artists</a>
        <a class="nav-link text-white" href="/albums/">Albums</a>

        <!-- Profile placeholder -->
        <div class="profile-icon"></div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
