{% extends 'music/base.html' %}

{% block title %}Delete Song | Music Hub{% endblock %}

{% block content %}
<section class="panel form-card">
    <h1 class="section-title title-with-icon">
        <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4v11.8a3.5 3.5 0 1 1-2-.1V7l10-2v10.8a3.5 3.5 0 1 1-2-.1V7z"></path></svg>
        Delete song
    </h1>
    <p class="entity-sub">Delete <strong>{{ song.title }}</strong>? This cannot be undone.</p>

    <form method="post" class="toolbar">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
        <a href="{% url cancel_url %}" class="btn btn-ghost">Cancel</a>
    </form>
</section>
{% endblock %}
