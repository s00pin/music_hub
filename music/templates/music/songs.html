{% extends 'music/base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

<h2>Songs</h2>

<a href="/songs/add/" class="btn btn-primary">

+ Add Song

</a>

</div>

<table class="table table-hover">

<thead>

<tr>

<th>Title</th>

<th>Artist</th>

<th>Album</th>

<th>Genre</th>

<th></th>

</tr>

</thead>

<tbody>

{% for song in songs %}

<tr>

<td>{{ song.title }}</td>

<td>{{ song.artist }}</td>

<td>{{ song.album }}</td>

<td>{{ song.genre }}</td>

<td>

<a
class="btn btn-warning btn-sm"
href="/songs/edit/{{ song.id }}/">

Edit

</a>

<a
class="btn btn-danger btn-sm"
href="/songs/delete/{{ song.id }}/">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
