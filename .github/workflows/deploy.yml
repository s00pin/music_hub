name: Deploy to Ubuntu Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: music.swop-nil.com
          username: swopnil
          key_path: ~/.ssh/deploy_key
          port: 22
          script: |
            cd /var/www/projects/django
            ./deploy.sh
