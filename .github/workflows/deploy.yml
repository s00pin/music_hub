name: Deploy to Ubuntu Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 20.229.186.214
          username: swopnil
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e

            BASE_DIR="/var/www/projects/django"
            if [ -d "$BASE_DIR/.git" ] && [ -f "$BASE_DIR/manage.py" ]; then
              APP_DIR="$BASE_DIR"
            elif [ -d "$BASE_DIR/music_hub/.git" ] && [ -f "$BASE_DIR/music_hub/manage.py" ]; then
              APP_DIR="$BASE_DIR/music_hub"
            else
              echo "Could not find a Django git repo under $BASE_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            DB_BACKUP="/tmp/music_hub_db.sqlite3"
            MEDIA_BACKUP="/tmp/music_hub_media_backup"

            echo "[1/6] Backup runtime data"
            if [ -f "db.sqlite3" ]; then
              cp -f "db.sqlite3" "$DB_BACKUP"
            fi
            rm -rf "$MEDIA_BACKUP"
            mkdir -p "$MEDIA_BACKUP"
            if [ -d "media" ]; then
              cp -a media/. "$MEDIA_BACKUP"/
            fi

            echo "[2/6] Sync code"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e db.sqlite3 -e media/ -e staticfiles/ -e venv/ -e .venv/

            echo "[3/6] Restore runtime data"
            if [ -f "$DB_BACKUP" ]; then
              cp -f "$DB_BACKUP" "db.sqlite3"
            fi
            if [ -d "$MEDIA_BACKUP" ]; then
              mkdir -p media
              cp -a "$MEDIA_BACKUP"/. media/
            fi

            if [ -f "deploy.sh" ]; then
              echo "[4/6] Run deploy.sh"
              bash ./deploy.sh
              exit 0
            fi

            echo "[4/6] Activate virtualenv"
            if [ -f ".venv/bin/activate" ]; then
              . ".venv/bin/activate"
            elif [ -f "venv/bin/activate" ]; then
              . "venv/bin/activate"
            else
              echo "Virtualenv not found (.venv or venv)."
              exit 1
            fi

            echo "[5/6] Run migrations and static collection"
            python manage.py migrate --noinput

            python manage.py collectstatic --noinput

            echo "[6/6] Restart app services"
            if systemctl list-unit-files | grep -q '^django\.service'; then
              sudo systemctl restart django
            elif systemctl list-unit-files | grep -q '^gunicorn\.service'; then
              sudo systemctl restart gunicorn
            else
              echo "Neither django.service nor gunicorn.service found."
              exit 1
            fi

            sudo systemctl restart nginx
            sudo systemctl status --no-pager django nginx || sudo systemctl status --no-pager gunicorn nginx
